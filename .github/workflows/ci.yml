name: quality-gates

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  native:
    name: ${{ matrix.os }} / Qt 6.8.3
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97.1
        with:
          components: clippy,rustfmt
      - uses: taiki-e/install-action@just
      - name: Install Linux runtime dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libxkbcommon-x11-0 ninja-build
      - uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          modules: 'qtshadertools'
          cache: true
      - name: Select Ninja
        if: runner.os != 'Windows'
        run: echo "CMAKE_GENERATOR=Ninja" >> "$GITHUB_ENV"
      - name: Format
        run: cargo fmt --all --check
      - name: Lint Rust workspace
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test Rust workspace
        run: cargo test --workspace --exclude parchmint_bridge --locked
      - name: Configure native application
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build native application
        run: cmake --build build --config Release --parallel
      - name: Lint QML
        run: cmake --build build --config Release --target qmllint
      - name: Native tests and smoke launch
        run: ctest --test-dir build -C Release --output-on-failure

  dependency-policy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97.1
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check advisories bans licenses sources
