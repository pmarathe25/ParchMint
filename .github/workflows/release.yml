name: release-candidate

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish already validated artifacts to a GitHub release'
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  packages:
    name: ${{ matrix.os }} package
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97.1
        with:
          components: clippy,rustfmt
      - name: Install Linux runtime dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libxkbcommon-x11-0 ninja-build
      - uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          modules: 'qtshadertools'
          cache: true
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build and test
        run: cmake --build build --config Release --parallel && ctest --test-dir build -C Release --output-on-failure
      - name: Package engineering candidate
        run: cpack --config build/CPackConfig.cmake -C Release -B build/packages
      - name: Collect package and checksum
        shell: bash
        run: |
          mkdir -p release
          find build/packages -maxdepth 2 -type f \( -name 'ParchMint-*' -o -name '*.dmg' -o -name '*.msi' -o -name '*.zip' -o -name '*.tar.gz' \) -exec cp {} release/ \;
          cmake -E sha256sum release/* > release/SHA256SUMS-${{ runner.os }}.txt
      - uses: actions/upload-artifact@v4
        with:
          name: parchmint-${{ runner.os }}-${{ runner.arch }}
          path: release/
          if-no-files-found: error

  evidence:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97.1
      - uses: taiki-e/install-action@cargo-deny
      - name: Dependency and license policy
        run: cargo deny check advisories bans licenses sources
      - name: Generate locked SBOM and notices
        run: cargo run --locked -p parchmint-test-support --bin release-evidence -- release-evidence
      - name: Assert no production network client
        shell: bash
        run: |
          if rg 'QNetwork|reqwest|hyper::Client|TcpStream|UdpSocket' app crates --glob '!**/target/**'; then
            echo 'production network API found' >&2
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: parchmint-release-evidence
          path: |
            release-evidence/
            docs/legal/
            docs/format/
            docs/release/

  publish:
    if: github.event_name == 'workflow_dispatch' && inputs.publish && startsWith(github.ref, 'refs/tags/v')
    needs: [packages, evidence]
    runs-on: ubuntu-24.04
    environment: production-release
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: authorized-release
          merge-multiple: true
      - name: Publish only after protected-environment approval
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" authorized-release/* --verify-tag --generate-notes
