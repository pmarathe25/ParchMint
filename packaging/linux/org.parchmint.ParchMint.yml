app-id: org.parchmint.ParchMint
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk
command: parchmint
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=home
modules:
  - name: parchmint
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: dir
        path: ../..
